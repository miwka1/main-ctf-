# Docker профиль - настройки для запуска в контейнере
# Этот файл активируется когда SPRING_PROFILES_ACTIVE=docker

# Spring Boot будет использовать переменные окружения из docker-compose.yml
# или эти значения по умолчанию:
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/ctf}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Mygiv@ra999}
spring.datasource.driver-class-name=org.postgresql.Driver

# Остальные настройки наследуются из application.properties