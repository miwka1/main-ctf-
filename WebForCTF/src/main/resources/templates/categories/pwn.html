<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTF Platform - PWN Challenges</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/components/header.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background: #0d0d0d;
            color: #fff;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, #0a1f0a 0%, #000 70%);
            z-index: -2;
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: linear-gradient(135deg, #00ff88, #00ffaa);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 15s infinite linear;
        }

        .particle:nth-child(1) {
            width: 80px;
            height: 80px;
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .particle:nth-child(2) {
            width: 120px;
            height: 120px;
            top: 60%;
            left: 80%;
            animation-delay: 3s;
            opacity: 0.2;
        }

        .particle:nth-child(3) {
            width: 60px;
            height: 60px;
            top: 80%;
            left: 10%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            25% {
                transform: translateY(-20px) translateX(10px) rotate(90deg);
            }
            50% {
                transform: translateY(0) translateX(20px) rotate(180deg);
            }
            75% {
                transform: translateY(20px) translateX(10px) rotate(270deg);
            }
        }

        .category-header {
            text-align: center;
            margin: 40px 0 30px;
            padding: 20px;
            position: relative;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8em;
            font-weight: 900;
            background: linear-gradient(90deg, #00ff88, #00ffaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            position: relative;
            display: inline-block;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 25%;
            width: 50%;
            height: 3px;
            background: linear-gradient(90deg, #00ff88, #00ffaa);
            border-radius: 2px;
        }

        .category-subtitle {
            font-size: 1.2em;
            color: #aaa;
            margin-top: 20px;
        }

        /* Контейнер с двумя колонками */
        .container {
            display: flex;
            flex-direction: row;
            gap: 30px;
            max-width: 1400px;
            margin: 30px auto;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        /* Левая колонка */
        .tasks-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
        }

        .task-item {
            background: rgba(20, 20, 20, 0.9);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0, 255, 136, 0.2);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .task-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, 0.1), transparent);
            transition: 0.5s;
        }

        .task-item:hover::before {
            left: 100%;
        }

        .task-item:hover {
            transform: translateY(-5px);
            border-color: #00ff88;
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4);
        }

        .task-item.active {
            background: linear-gradient(135deg, #00ff88, #00ffaa);
            color: #000;
            border: none;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
            transform: scale(1.05);
        }

        /* Правая колонка */
        .task-details {
            flex: 2;
            background: rgba(15, 15, 15, 0.95);
            padding: 30px;
            border-radius: 16px;
            border: 1px solid rgba(0, 255, 136, 0.3);
            display: flex;
            flex-direction: column;
            gap: 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .task-details::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #00ff88, #00ffaa);
        }

        .task-title {
            font-size: 2.2em;
            font-weight: 700;
            background: linear-gradient(90deg,#00ff88,#00ffaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            font-family: 'Orbitron', sans-serif;
            position: relative;
            padding-bottom: 15px;
        }

        .task-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #00ff88, #00ffaa);
            border-radius: 2px;
        }

        .task-desc {
            font-size: 1.1em;
            line-height: 1.6;
            color: #ccc;
            background: rgba(30, 30, 30, 0.5);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #00ff88;
        }

        .letters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 20px;
            border-radius: 12px;
            background: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .letter {
            width: 45px;
            height: 45px;
            background: rgba(10, 10, 10, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(0, 255, 136, 0.3);
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1em;
        }

        .letter:hover {
            background: linear-gradient(135deg,#00ff88,#00ffaa);
            color: #000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 255, 136, 0.4);
        }

        .answer-section {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .answer-input {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid rgba(0, 255, 136, 0.3);
            outline: none;
            background: rgba(20, 20, 20, 0.9);
            color: #fff;
            font-size: 1.1em;
            transition: 0.3s;
        }

        .answer-input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .submit-btn {
            padding: 15px 30px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg,#00ff88,#00ffaa);
            cursor: pointer;
            font-weight: 700;
            color: #000;
            transition: all 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 255, 136, 0.4);
        }

        #result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(30, 30, 30, 0.8);
            border: 1px solid rgba(0, 255, 136, 0.2);
            min-height: 60px;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .exec-section {
            background: rgba(25, 25, 25, 0.8);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
        }

        /* Адаптив для мобильных */
        @media (max-width: 992px) {
            .container {
                flex-direction: column;
            }

            .tasks-list {
                max-width: 100%;
            }

            .section-title {
                font-size: 2.2em;
            }
        }

        @media (max-width: 768px) {
            .section-title {
                font-size: 1.8em;
            }

            .task-title {
                font-size: 1.6em;
            }

            .letter {
                width: 40px;
                height: 40px;
            }
        }
    </style>
</head>
<body class="body-pwn">
<div class="background"></div>
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div th:replace="~{fragments/header :: header}"></div>

<div class="category-header">
    <h1 class="section-title">⚡ PWN Challenges</h1>
    <p class="category-subtitle">Binary exploitation and reverse engineering</p>
</div>

<div class="container">
    <!-- Левая колонка с заданиями -->
    <div class="tasks-list" id="tasksList"></div>

    <!-- Правая колонка с деталями -->
    <div class="task-details" id="taskDetails">
        <div class="task-title" id="taskTitle">Выберите задание</div>
        <div class="task-desc" style="white-space: pre-line;">Описание задания появится здесь</div>
        <div class="letters" id="lettersContainer"></div>
        <div class="answer-section">
            <input type="text" class="answer-input" id="answerInput" placeholder="Введите ответ">
            <button class="submit-btn" id="submitBtn">Ответ</button>
        </div>

        <div class="exec-section">
            <div class="answer-section">
                <input type="text" class="answer-input" placeholder="Введите команду для бинарного файла" id="execCommand">
                <button id="execButton" class="submit-btn">Выполнить</button>
            </div>
        </div>

        <div id="result"></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
<script src="/js/loadPWNtasks.js"></script>
<script src="/js/postPWNtasks.js"></script>
<script src="/js/runBinary.js"></script>

<script>
    // Все функции остаются без изменений
    const apiBaseUrl = 'http://5.61.36.169:8081';
    const tasksList = document.getElementById('tasksList');
    let tasks = [];

    async function init() {
        tasks = await loadTasks();
        num = 1;

        if (tasks && tasks.length > 0) {
            tasks.forEach((task, index) => {
                if (task.category != "pwn") {
                    return;
                }
                if (task.difficulty == "easy") {
                    const btn = document.createElement('div');
                    btn.className = 'task-item';
                    btn.textContent = num;
                    btn.addEventListener('click', () => {
                    showTask(index);
                    document.querySelectorAll('.task-item').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    });
                    tasksList.appendChild(btn);
                    num++;
                }
            });
            tasks.forEach((task, index) => {
                if (task.category !== "pwn") {
                    return;
                }
                if (task.difficulty == "medium") {
                    const btn = document.createElement('div');
                    btn.className = 'task-item';
                    btn.textContent = num;
                    btn.addEventListener('click', () => {
                    showTask(index);
                    document.querySelectorAll('.task-item').forEach(t => t.classList.remove('active'));
                    btn.classList.add('active');
                    });
                    tasksList.appendChild(btn);
                    num++;
                }
            });

            if (tasks.length > 0) {
                showTask(0);
                const firstBtn = tasksList.querySelector('.task-item');
                if (firstBtn) firstBtn.classList.add('active');
            }

        } else {
            tasksList.innerHTML = '<div class="error">Нет доступных задач</div>';
        }
    }


    function showTask(index){
        const task = tasks[index];
        const details = document.getElementById('taskDetails');
        details.querySelector('.task-title').textContent = task.title;
        details.querySelector('.task-desc').textContent = task.description;

        const lettersContainer = document.getElementById('lettersContainer');
        lettersContainer.innerHTML='';
        if (task.difficulty == "easy") {
            for (let l of "EASY") {
                const div = document.createElement('div');
                div.className='letter';
                div.textContent = l;
                lettersContainer.appendChild(div);
            }
        } else {
            for (let l of "MEDIUM") {
                const div = document.createElement('div');
                div.className='letter';
                div.textContent = l;
                lettersContainer.appendChild(div);
            }
        }
    }

    let lastData = JSON.parse(localStorage.getItem("lastData")) || null;

    function isDataEqual(obj1, obj2) {
        return JSON.stringify(obj1) === JSON.stringify(obj2);
    }

    async function checkForUpdates() {
        try {
            const response = await fetch(`${apiBaseUrl}/taskspwn/available`);
            const currentData = await response.json();

            if (!isDataEqual(lastData, currentData)) {
                lastData = currentData;
                localStorage.setItem("lastData", JSON.stringify(currentData));
                location.reload();
            }
        } catch (error) {
            console.error("Ошибка при проверке обновлений:", error);
        }
    }

    // Проверяем каждые 5 секунд
    setInterval(checkForUpdates, 10000);

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
