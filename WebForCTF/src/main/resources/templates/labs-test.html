<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LABs – Тест по лабораторным</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layout.css">
    <link rel="stylesheet" href="/css/pages/tests.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="body-test">

<div class="background"></div>
<div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
</div>

<div th:replace="~{fragments/header :: header}"></div>

<div class="test-container">
    <header class="test-header">
        <div class="test-header-content">
            <h1 class="test-title">
                <span class="test-title-main">LABs</span>
                <span class="test-title-sub">Тест по лабораторным работам</span>
            </h1>
            <div class="test-progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="labsProgressFill"></div>
                </div>
                <div class="progress-text">
                    Задание <span id="labsSolved">0</span> из <span id="labsTotal">55</span>
                </div>
            </div>
        </div>
    </header>

    <div class="questions-container labs-questions-container" id="labTasksContainer">
    </div>

    <div class="results-actions" style="margin-top: 20px; justify-content: center;">
        <button class="action-btn primary-btn" id="labsFinishBtn">
            Завершить тест
        </button>
    </div>

    <div class="results-section" id="labsResultsSection" style="display: none;">
        <div class="results-card">
            <div class="results-header">
                <div class="results-icon">🏁</div>
                <h2 class="results-title">Все задания проверены</h2>
                <p class="results-subtitle">Вы можете сохранить результаты или вернуться к заданиям.</p>
            </div>
            <div class="results-stats">
                <div class="stat-item">
                    <div class="stat-value" id="labsFinalSolved">0</div>
                    <div class="stat-label">Верных флагов</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="labsFinalTotal">55</div>
                    <div class="stat-label">Всего заданий</div>
                </div>
            </div>
            <div class="results-actions">
                <button class="action-btn primary-btn" id="labsBackToTasksBtn">
                    Вернуться к заданиям
                </button>
            </div>
        </div>
    </div>
</div>

<!-- JS -->
<script src="/js/labs-test.js"></script>
</body>
</html>
