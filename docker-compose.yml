services:
  db:
    image: postgres:15-alpine
    container_name: postgres-ctf
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ctf}
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./ServerForCTF
      dockerfile: Dockerfile  # Явное указание
    container_name: spring-ctf-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-ctf}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    ports:
      - "8081:8080"
    networks:
      - appnet
    restart: on-failure

  frontend:
    build: 
      context: ./WebForCTF
      dockerfile: Dockerfile  # Явное указание
    container_name: ctf-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    networks:
      - appnet
    restart: on-failure

networks:
  appnet:

volumes:
  postgres-data: